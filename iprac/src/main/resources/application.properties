spring.application.name=iprac
server.port=8080
# Gemini API Configuration
gemini.api.key=AIzaSyA2uhq-oUgJWf_6_mj9BV-eD8H_6vZoYuI
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# -------------------------
# Datasource / JDBC
# -------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/iprac_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------
# JPA / Hibernate
# -------------------------
# How Hibernate should handle schema (none, validate, update, create, create‑drop)
spring.jpa.hibernate.ddl-auto=update

# Print SQL to console
spring.jpa.show-sql=true

# Dialect for MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# -------------------------
# HikariCP settings
# -------------------------
# Maximum number of connections in the pool
spring.datasource.hikari.maximum-pool-size=10
# Minimum idle connections in the pool
spring.datasource.hikari.minimum-idle=2
# Connection timeout (ms)
spring.datasource.hikari.connection-timeout=30000

# JWT Configuration
app.jwt.secret=your-secret-key-should-be-at-least-256-bits-long-for-security
app.jwt.expiration.ms=86400000
